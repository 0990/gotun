<template>
    <div class="layout">
        <i-breadcrumb :style="{margin: '24px 24px'}">
            <i-breadcrumb-item>tunnel</i-breadcrumb-item>
            <i-breadcrumb-item>list</i-breadcrumb-item>
        </i-breadcrumb>
            <i-content :style="{padding: '24px', minHeight: '280px', background: '#fff'}">
            <i-row>
                <i-col span="12" :style="{textAlign:'left'}">
                    <i-button :type="probeEnabled ? 'warning' : 'info'" @click="invokeProbeToggle">{{ probeButtonText }}</i-button>
                    <i-button type="info" @click="invokeCreate">创建</i-button>
                    <i-button type="info" @click="invokeImport">导入</i-button>
                    <input type="file" id="input" multiple accept=".tun">
                </i-col>
                <i-col span="12" :style="{textAlign:'right'}">
                    <i-button type="default" @click="invokeEchoCheck">echo检测</i-button>
                    <i-button type="default" @click="invokeSocks5Check">socks5检测</i-button>
                    <i-button type="default" @click="invokeHttpProxyCheck">httpproxy检测</i-button>
                    <input type="text" id="target_addr" value="127.0.0.1:1080",placeholder="127.0.0.1:1080">
                    <i-button type="default" @click="invokeFlushList">刷新列表</i-button>
                </i-col>
            </i-row>
            <br>
            <i-table :columns="col_list" :data="main_data"  @on-selection-change="table_selection_change">
                <template slot-scope="{row}" slot="detail_button">
                    <i-button type="info" size="small" @click="invokeView(row)">查看</i-button>
                    <i-button type="info" size="small" @click="invokeEdit(row)">编辑</i-button>
                    <i-button type="info" size="small" :loading="bandwidthPendingName === row.name" @click="invokeBandwidthTest(row)">宽带</i-button>
                    <i-button type="info" size="small" @click="invokeExport(row)">导出</i-button>
                    <i-button type="default" size="small" @click="invokeDelete(row)">删除</i-button>
                </template>
            </i-table>
            <i-page :styles="{margin:'20px'}" :total="pageTotal" :page-size="pageSize" show-elevator show-total  @on-change="invokeChangePage" ></i-page>
            <i-modal v-model="viewModal" :width="50" title="preview">
                <i-row type="flex" justify="start" align="middle" :gutter="16" v-for="(value, name) in viewModalData" :style="{margin:'5px 0'}">
                    <i-col span="6" :style="{textAlign:'right'}">{{name}}</i-col>
                    <i-col span="12">
                        <i-input v-model="viewModalData[name]" type="textarea" :autosize="{minRows:1,maxRows:6}"></i-input>
                    </i-col>
                </i-row>
            </i-modal>
            <i-modal v-model="deleteModal" title="del">
                <p slot="header" style="color:#f60;text-align:center">
                    <i-icon type="ios-information-circle"></i-icon>
                    <span>Delete confirmation</span>
                </p>
                <div style="text-align:center">
                    <p>confirm delete?</p>
                    <p>The operation delete record from the database</p>
                </div>
                <div slot="footer">
                    <i-row type="flex" justify="end">
                        <i-col span="12">
                            <i-button type="info" size="large" long @click="deleteModal = false;deleteModalData = {}">Cancel</i-button>
                        </i-col>
                        <i-col span="4">
                            <i-button type="error" size="large" @click="invokeConfirmDelete()" >Delete</i-button>
                        </i-col>
                    </i-row>
                </div>
            </i-modal>
        </i-content>
    </div>
</template>
<script type="text/javascript">
    module.exports = {
        data: function() {
            return {
                main_data: [],
                pageTotal:0,
                pageSize:0,
                probeEnabled:false,
                probeTimer:null,
                probeRefreshTimer:null,
                probePending:false,
                bandwidthPendingName:'',
                viewModal:false,
                viewModalData:{},
                deleteModal:false,
                deleteModalData: {},
                batchDeleteModal:false,
                batchDeleteModalData:[],
                col_list: [
                    {type:'selection',width:60,align:'center'},
                    {title:'name', key:'name'},
                    {title:'status', key:'status'},
                    {title:'rtt_ms', key:'quality_rtt'},
                    {title:'loss_pct', key:'quality_loss'},
                    {title:'bandwidth_mbps', key:'bandwidth_mbps'},
                    {title:'input', key:'input'},

                    {title:'output', key:'output'},

                    {title:'operate', slot:'detail_button', width: 340}
                ],
                routePage:this.page ?this.page : '',
                info:{},
                search_fields: [
                ],
                fields_type:{
                    name:'string',
                    input:'string',
                    mode:'string',
                    in_proto_cfg:'string',
                    in_decrypt_mode:'string',
                    in_decrypt_key:'string',
                    in_extend:'string',

                    output:'string',
                    out_proto_cfg:'string',
                    out_crypt_mode:'string',
                    out_crypt_key:'string',
                    out_extend:'string',

created_at:'string',

                }
            }
        },
        props: ['page'],
        computed: {
            probeButtonText: function() {
                return this.probeEnabled ? 'Probe On' : 'Probe';
            }
        },
        methods: {
            normalizeTunnelRow: function(item) {
                const quality = item.quality_summary || {};
                const bandwidth = item.bandwidth_summary || {};
                item.quality_status = quality.status || 'disabled';
                item.quality_rtt = item.quality_status === 'disabled' ? -1 : (quality.rtt_ms ?? 0);
                item.quality_loss = item.quality_status === 'disabled' ? -1 : (quality.loss_pct ?? 0);
                item.bandwidth_status = bandwidth.status || 'disabled';
                item.bandwidth_mbps = item.bandwidth_status === 'disabled' ? -1 : Number(Number(bandwidth.mbps ?? 0).toFixed(2));
                return item;
            },
            scheduleProbeListRefresh: function(delayMS) {
                if(this.probeRefreshTimer) {
                    clearTimeout(this.probeRefreshTimer);
                }
                this.probeRefreshTimer = setTimeout(() => {
                    this.probeRefreshTimer = null;
                    this.tableData();
                }, delayMS || 300);
            },
            tableData: function() {
                var pageStr = this.routePage ? '?page='+this.routePage : '';

                if(!this.verifyFieldType()) {
                    return
                }

                this.axios
                    .post('/api/tunnel/list'+pageStr,this.info)
                    .then(response=>{
                        if(response.data.code !== 200) {
                            alert(response.data.msg)
                            return
                        }
                        document.getElementById('appName').textContent="gotun "+response.data.data.version;
                        this.main_data = response.data.data.list.map(item => this.normalizeTunnelRow(item)),
                        this.pageTotal = response.data.data.pagination.total_nums,
                        this.pageSize = response.data.data.pagination.page_size
                    })
            },
            invokeChangePage: function(page) {
                this.$router.push({query:{page:page}})
            },
            invokeFlushList:function (){
                this.tableData()
            },
            invokeProbeToggle: function() {
                if (this.probeEnabled) {
                    this.stopProbeLoop();
                    this.$Message.success('probe stopped');
                    return
                }
                this.probeEnabled = true;
                this.fireProbe();
                this.probeTimer = setInterval(() => {
                    this.fireProbe();
                }, 1000);
                this.$Message.success('probe started');
            },
            fireProbe: function() {
                if(!this.probeEnabled || this.probePending) {
                    return
                }
                this.probePending = true
                this.axios
                    .post('/api/tunnel/probe')
                    .then(response=>{
                        if(response.data.code !== 200) {
                            this.$Message.error(response.data.msg);
                            this.stopProbeLoop();
                            return
                        }
                        this.scheduleProbeListRefresh(300);
                    })
                    .catch(error => {
                        const msg = error && error.message ? error.message : 'probe request failed';
                        this.$Message.error(msg);
                        this.stopProbeLoop();
                    })
                    .finally(() => {
                        this.probePending = false;
                    })
            },
            stopProbeLoop: function() {
                this.probeEnabled = false;
                if(this.probeTimer) {
                    clearInterval(this.probeTimer);
                    this.probeTimer = null;
                }
                if(this.probeRefreshTimer) {
                    clearTimeout(this.probeRefreshTimer);
                    this.probeRefreshTimer = null;
                }
                this.probePending = false;
            },
            invokeEchoCheck: function() {
                this.invokeCheckServer("echo");
            },
            invokeSocks5Check: function() {
                this.invokeCheckServer("socks5");
            },
            invokeHttpProxyCheck: function() {
                this.invokeCheckServer("httpproxy");
            },
            invokeCheckServer: function(serverType) {
                const targetAddr = document.getElementById('target_addr').value;

                var paramStr = '?serverType='+serverType+'&targetAddr='+targetAddr;
                this.axios
                    .post('/api/tunnel/check_server'+paramStr)
                    .then(response=>{
                        alert(response.data.msg);
                    })
            },

            invokeDetail: function(row) {
                // console.info(this.$route)
                this.$router.push({path:'/tunnel/detail',query:{id:row.id}})
            },
            invokeEdit: function(row) {
                this.$router.push({path:'/tunnel/edit',query:{data:row}})
            },
            invokeBandwidthTest: function(row) {
                if(this.bandwidthPendingName) {
                    return
                }
                this.bandwidthPendingName = row.name;
                this.axios
                    .post('/api/tunnel/bandwidth?name='+encodeURIComponent(row.name))
                    .then(response => {
                        if(response.data.code !== 200) {
                            this.$Message.error(response.data.msg);
                            return
                        }
                        const payload = response.data.data || {};
                        row.bandwidth_summary = payload.summary || {};
                        this.normalizeTunnelRow(row);
                        if(row.bandwidth_status === 'ok') {
                            this.$Message.success(row.name+' bandwidth '+row.bandwidth_mbps+' Mbps');
                            return
                        }
                        this.$Message.warning(response.data.msg || row.bandwidth_status);
                    })
                    .catch(error => {
                        const msg = error && error.message ? error.message : 'bandwidth request failed';
                        this.$Message.error(msg);
                    })
                    .finally(() => {
                        this.bandwidthPendingName = '';
                    })
            },
            invokeExport: function(row) {
                url = "/api/tunnel/export?name="+row.name;
                window.open(url)
            },
            invokeImport: function(){
                self = this;
                const files = document.getElementById('input').files;

                for (let i = 0, numFiles = files.length; i < numFiles; i++) {
                    const file = files[i];
                    var reader = new FileReader();
                    reader.onload = function (event) {
                        // event.target.result就是读取的内容
                        console.log(event.target.result);
                        var json = JSON.parse(event.target.result);
                        self.axios.post('/api/tunnel/import',event.target.result).then(response=>{
                            if(response.data.code !== 200) {
                                alert(response.data.msg)
                                return
                            }
                            self.tableData();
                        })
                    };
                    reader.readAsText(file);
                }
            },
            invokeCreate: function() {
                this.$router.push({path:'/tunnel/create'})
            },
            invokeDelete: function(row) {
                // modal
                this.deleteModal=true
                this.deleteModalData = row
                console.info(row)
            },
            invokeConfirmDelete: function() {
                this.axios
                    .post('/api/tunnel/delete',{name:this.deleteModalData.name})
                    .then(response=>{
                        if(response.data.code !== 200) {
                            alert(response.data.msg)
                            return
                        }
                        this.deleteModal = false
                        this.deleteModalData = {}
                        this.tableData()
                    })
            },
            invokeView:function(row) {
                this.axios
                    .get('/api/tunnel/quality?name='+row.name)
                    .then(response=>{
                        if(response.data.code !== 200) {
                            alert(response.data.msg)
                            return
                        }
                        const payload = response.data.data || {};
                        const summary = payload.summary || {};
                        const details = payload.details || {};
                        this.viewModal = true
                        this.viewModalData = {
                            name: row.name,
                            status: summary.status || row.quality_status,
                            rtt_ms: String(summary.rtt_ms ?? row.quality_rtt),
                            loss_pct: String(summary.loss_pct ?? row.quality_loss),
                            bandwidth_status: row.bandwidth_status,
                            bandwidth_mbps: String(row.bandwidth_mbps),
                            summary: JSON.stringify(summary, null, 2),
                            details: JSON.stringify(details, null, 2),
                        }
                    })
            },
            invokeBatchDelete: function() {
                if(this.batchDeleteModalData.length == 0) {
                    alert('Please select items first!');
                    return;
                }
                this.batchDeleteModal=true
            },
            table_selection_change(rows) {
                this.batchDeleteModalData = []

                for (var i in rows) {
                    this.batchDeleteModalData.push(rows[i].id)
                }
            },
            verifyFieldType: function () {
                for(var name in this.info) {
                    if(this.fields_type[name] === "number") {
                        if(isNaN(this.info[name])) {
                            alert(name+" is not a number")
                            return false
                        }
                        this.info[name] = Number(this.info[name])
                    }else if(this.fields_type[name] === "string") {
                        this.info[name] = String(this.info[name])
                    }
                }
                return true;
            }
        },
        created: function() {
            this.tableData();
        },
        beforeRouteUpdate: function(to, from ,next) {
            this.routePage = to.query.page
            this.tableData();
            next()
        },
        beforeRouteLeave: function(to, from, next) {
            this.stopProbeLoop();
            next()
        },
        beforeDestroy: function() {
            this.stopProbeLoop();
        }
    }
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gotun login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: linear-gradient(135deg, #eef5ff 0%, #f8fbff 45%, #edf8f4 100%);
            --card: rgba(255, 255, 255, 0.92);
            --line: rgba(23, 48, 88, 0.12);
            --text: #173058;
            --muted: #60718f;
            --accent: #1769aa;
            --accent-hover: #0f5589;
            --danger: #c44343;
            --shadow: 0 24px 80px rgba(28, 62, 110, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(420px, 100%);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 32px 28px;
            backdrop-filter: blur(12px);
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.04em;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 14px;
            color: var(--muted);
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.95);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input:focus {
            border-color: rgba(23, 105, 170, 0.7);
            box-shadow: 0 0 0 4px rgba(23, 105, 170, 0.12);
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            font-size: 14px;
            color: var(--muted);
        }

        .message.error {
            color: var(--danger);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <h1>gotun</h1>
    </div>

    <form id="login-form">
        <label>
            用户名
            <input id="username" name="username" autocomplete="username" required>
        </label>
        <label>
            密码
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button id="submit" type="submit">登录</button>
    </form>

    <div id="message" class="message"></div>
</div>

<script>
    const form = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitButton = document.getElementById('submit');
    const message = document.getElementById('message');

    function setMessage(text, isError) {
        message.textContent = text || '';
        message.className = isError ? 'message error' : 'message';
    }

    function setPending(pending) {
        submitButton.disabled = pending;
        submitButton.textContent = pending ? '登录中...' : '登录';
    }

    async function parseJsonResponse(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            const error = new Error((data && data.msg) || ('request failed: ' + response.status));
            error.payload = data;
            throw error;
        }
        return data;
    }

    async function sha256Bytes(text) {
        if (!window.crypto || !window.crypto.subtle) {
            return sha256Fallback(toUtf8Bytes(text));
        }
        const bytes = new TextEncoder().encode(text);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return new Uint8Array(digest);
    }

    async function hmacSha256Hex(keyBytes, text) {
        if (!window.crypto || !window.crypto.subtle) {
            return bytesToHex(hmacSha256Fallback(keyBytes, toUtf8Bytes(text)));
        }
        const cryptoKey = await crypto.subtle.importKey(
            'raw',
            keyBytes,
            {name: 'HMAC', hash: 'SHA-256'},
            false,
            ['sign']
        );
        const signature = await crypto.subtle.sign('HMAC', cryptoKey, new TextEncoder().encode(text));
        return Array.from(new Uint8Array(signature))
            .map(value => value.toString(16).padStart(2, '0'))
            .join('');
    }

    function toUtf8Bytes(text) {
        if (window.TextEncoder) {
            return new TextEncoder().encode(text);
        }

        const encoded = unescape(encodeURIComponent(text));
        const bytes = new Uint8Array(encoded.length);
        for (let i = 0; i < encoded.length; i++) {
            bytes[i] = encoded.charCodeAt(i);
        }
        return bytes;
    }

    function bytesToHex(bytes) {
        return Array.from(bytes)
            .map(value => value.toString(16).padStart(2, '0'))
            .join('');
    }

    function rightRotate(value, bits) {
        return (value >>> bits) | (value << (32 - bits));
    }

    function sha256Fallback(inputBytes) {
        const k = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
            0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
            0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
            0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
            0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
            0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
            0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
            0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
            0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
        ];
        const h = [
            0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
            0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
        ];
        const length = inputBytes.length;
        const bitLengthHi = Math.floor((length * 8) / 0x100000000);
        const bitLengthLo = (length * 8) >>> 0;
        const totalLength = (((length + 9 + 63) >> 6) << 6);
        const bytes = new Uint8Array(totalLength);
        bytes.set(inputBytes);
        bytes[length] = 0x80;
        bytes[totalLength - 8] = (bitLengthHi >>> 24) & 0xff;
        bytes[totalLength - 7] = (bitLengthHi >>> 16) & 0xff;
        bytes[totalLength - 6] = (bitLengthHi >>> 8) & 0xff;
        bytes[totalLength - 5] = bitLengthHi & 0xff;
        bytes[totalLength - 4] = (bitLengthLo >>> 24) & 0xff;
        bytes[totalLength - 3] = (bitLengthLo >>> 16) & 0xff;
        bytes[totalLength - 2] = (bitLengthLo >>> 8) & 0xff;
        bytes[totalLength - 1] = bitLengthLo & 0xff;

        const w = new Uint32Array(64);
        for (let offset = 0; offset < totalLength; offset += 64) {
            for (let i = 0; i < 16; i++) {
                const index = offset + i * 4;
                w[i] = (
                    (bytes[index] << 24) |
                    (bytes[index + 1] << 16) |
                    (bytes[index + 2] << 8) |
                    bytes[index + 3]
                ) >>> 0;
            }
            for (let i = 16; i < 64; i++) {
                const s0 = rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3);
                const s1 = rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10);
                w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
            }

            let a = h[0];
            let b = h[1];
            let c = h[2];
            let d = h[3];
            let e = h[4];
            let f = h[5];
            let g = h[6];
            let hh = h[7];

            for (let i = 0; i < 64; i++) {
                const s1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
                const ch = (e & f) ^ ((~e) & g);
                const temp1 = (hh + s1 + ch + k[i] + w[i]) >>> 0;
                const s0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
                const maj = (a & b) ^ (a & c) ^ (b & c);
                const temp2 = (s0 + maj) >>> 0;

                hh = g;
                g = f;
                f = e;
                e = (d + temp1) >>> 0;
                d = c;
                c = b;
                b = a;
                a = (temp1 + temp2) >>> 0;
            }

            h[0] = (h[0] + a) >>> 0;
            h[1] = (h[1] + b) >>> 0;
            h[2] = (h[2] + c) >>> 0;
            h[3] = (h[3] + d) >>> 0;
            h[4] = (h[4] + e) >>> 0;
            h[5] = (h[5] + f) >>> 0;
            h[6] = (h[6] + g) >>> 0;
            h[7] = (h[7] + hh) >>> 0;
        }

        const output = new Uint8Array(32);
        for (let i = 0; i < h.length; i++) {
            output[i * 4] = (h[i] >>> 24) & 0xff;
            output[i * 4 + 1] = (h[i] >>> 16) & 0xff;
            output[i * 4 + 2] = (h[i] >>> 8) & 0xff;
            output[i * 4 + 3] = h[i] & 0xff;
        }
        return output;
    }

    function hmacSha256Fallback(keyBytes, messageBytes) {
        const blockSize = 64;
        let normalizedKey = keyBytes;
        if (normalizedKey.length > blockSize) {
            normalizedKey = sha256Fallback(normalizedKey);
        }

        const paddedKey = new Uint8Array(blockSize);
        paddedKey.set(normalizedKey);

        const inner = new Uint8Array(blockSize + messageBytes.length);
        const outer = new Uint8Array(blockSize + 32);
        for (let i = 0; i < blockSize; i++) {
            inner[i] = paddedKey[i] ^ 0x36;
            outer[i] = paddedKey[i] ^ 0x5c;
        }
        inner.set(messageBytes, blockSize);
        outer.set(sha256Fallback(inner), blockSize);
        return sha256Fallback(outer);
    }

    async function ensureAuthenticated() {
        const response = await fetch('/api/auth/session', {
            method: 'GET',
            credentials: 'same-origin'
        });
        const payload = await parseJsonResponse(response);
        if (payload && payload.data && payload.data.authenticated) {
            window.location.replace('/');
        }
    }

    async function handleLogin(event) {
        event.preventDefault();

        const username = String(usernameInput.value || '').trim();
        const password = String(passwordInput.value || '');
        if (!username || !password) {
            setMessage('请输入用户名和密码。', true);
            return;
        }

        setPending(true);
        setMessage('');

        try {
            const challengeResponse = await fetch('/api/auth/challenge', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username})
            });
            const challengePayload = await parseJsonResponse(challengeResponse);
            const challenge = challengePayload && challengePayload.data ? challengePayload.data : {};

            const userKey = await sha256Bytes(username + ':' + String(challenge.realm || '') + ':' + password);
            const proof = await hmacSha256Hex(userKey, String(challenge.nonce || ''));
            passwordInput.value = '';

            const loginResponse = await fetch('/api/auth/login', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: username,
                    nonce: challenge.nonce,
                    proof: proof
                })
            });
            await parseJsonResponse(loginResponse);
            window.location.replace('/');
        } catch (error) {
            passwordInput.value = '';
            setMessage(error && error.message ? error.message : '登录失败', true);
        } finally {
            setPending(false);
        }
    }

    form.addEventListener('submit', handleLogin);
    ensureAuthenticated().catch(() => {});
</script>
</body>
</html>

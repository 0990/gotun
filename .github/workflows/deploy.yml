name: Deploy
on:
  workflow_dispatch:
    inputs:
      targets:
        description: '要部署的主机数组（JSON），例如 ["LOCAL30"]'
        required: true
        default: '["LOCAL30","LOCAL31","HK","SG"]'
      ref:
        description: '部署的 git ref。填 tag（如 v0.2.5）会注入该版本；填分支（如 master）则版本为 dev'
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.26.1"
      BINARY_NAME: gotun-linux-amd64
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.artifact.outputs.name }}
      binary_name: ${{ env.BINARY_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION=""
          INPUT_REF="${{ github.event.inputs.ref }}"

          case "${INPUT_REF}" in
            refs/tags/*)
              VERSION="${INPUT_REF#refs/tags/}"
              ;;
            v*)
              VERSION="${INPUT_REF}"
              ;;
          esac

          if [ -z "${VERSION}" ]; then
            VERSION="dev"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve artifact name
        id: artifact
        shell: bash
        run: |
          echo "name=gotun-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go mod download
          go build -ldflags "-X github.com/0990/gotun.Version=${{ steps.version.outputs.version }}" -o "${BINARY_NAME}" ./cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ env.BINARY_NAME }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: self-hosted
    needs: build
    strategy:
      matrix:
        host: ${{ fromJson(inputs.targets) }}
      fail-fast: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: deploy-artifact

      - name: Prepare binary
        shell: bash
        run: |
          cp "deploy-artifact/${{ needs.build.outputs.binary_name }}" gotun
          chmod +x gotun

      - name: Deploy to ${{ matrix.host }}
        shell: bash
        env:
          SSH_HOST: ${{ secrets[format('SSH_HOST_{0}', matrix.host)] }}
          SSH_USER: ${{ secrets[format('SSH_USER_{0}', matrix.host)] || 'root' }}
          SSH_PORT: ${{ secrets[format('SSH_PORT_{0}', matrix.host)] || '22' }}
          SSH_PASS: ${{ secrets[format('SSH_PASSWORD_{0}', matrix.host)] }}
        run: |
          set -euo pipefail
          echo "[deploy] target=${{ matrix.host }} host=${SSH_HOST} port=${SSH_PORT} version=${{ needs.build.outputs.version }}"

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          echo "[deploy] uploading binary"
          sshpass -p "$SSH_PASS" scp $SSH_OPTS -P "$SSH_PORT" gotun "$SSH_USER@$SSH_HOST:/data/gotun/gotun.new"

          echo "[deploy] running remote deployment commands"
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'EOF'
          set -e
          echo "[remote] host=$(hostname)"
          echo "[remote] pwd=$(pwd)"
          echo "[remote] stopping gotun"
          timeout 30s systemctl stop gotun
          echo "[remote] backing up current binary"
          cp /data/gotun/gotun /data/gotun/gotun.old
          echo "[remote] replacing binary"
          mv /data/gotun/gotun.new /data/gotun/gotun
          chmod +x /data/gotun/gotun
          echo "[remote] starting gotun"
          timeout 30s systemctl start gotun
          echo "[remote] gotun status"
          systemctl status gotun --no-pager -l
          echo "[remote] recent journal"
          journalctl -u gotun -n 50 --no-pager
          EOF
